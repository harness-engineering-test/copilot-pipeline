name: Create Feature PR

on:
  issues:
    types: [closed]

permissions:
  issues: read
  pull-requests: write
  contents: read

jobs:
  check-all-subtasks:
    runs-on: ubuntu-latest
    steps:
      - name: Check if all subtasks are closed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} \
            --repo "$REPO" --json body -q '.body')

          PARENT_NUM=$(echo "$ISSUE_BODY" | grep -oE '親Issue #[0-9]+' | grep -oE '[0-9]+' | head -1)
          [ -z "$PARENT_NUM" ] && exit 0

          EXISTING_PR=$(gh pr list --repo "$REPO" \
            --head "feature/$PARENT_NUM" --base develop --state open \
            --json number -q '.[0].number')
          [ -n "$EXISTING_PR" ] && exit 0

          ALL_ISSUES=$(gh issue list --repo "$REPO" --state all \
            --json number,body,state --limit 500)
          TOTAL=$(jq --arg parent "親Issue #$PARENT_NUM" \
            '[.[] | select(.body != null and (.body | contains($parent)))] | length' \
            <<< "$ALL_ISSUES")
          CLOSED=$(jq --arg parent "親Issue #$PARENT_NUM" \
            '[.[] | select(.body != null and (.body | contains($parent)) and .state == "CLOSED")] | length' \
            <<< "$ALL_ISSUES")

          if [ "$TOTAL" -gt 0 ] && [ "$TOTAL" -eq "$CLOSED" ]; then
            echo "All $TOTAL subtasks closed. Creating feature PR."
            gh pr create \
              --repo "$REPO" \
              --base develop \
              --head "feature/$PARENT_NUM" \
              --title "[Feature] #$PARENT_NUM 全実装完了" \
              --body "親Issue: #$PARENT_NUM\n\n全サブタスクがマージ済みです。レビューをお願いします。" \
              --label "レビュー待ち" || true
          fi
